# Stack dev/verify của tutor-api (db + api + verify). Chạy từ thư mục tutor-api/.
# `name` cố định để tên project không đổi theo thư mục.
name: kimthanh-tutor

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tutor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tutor"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - tutor-postgres-data:/var/lib/postgresql/data

  api:
    image: kimthanh-tutor-api:local
    build:
      # Context = thư mục tutor-api (nơi đặt compose file). Build tự chứa.
      context: .
      dockerfile: Dockerfile
    # Secret/creds nạp từ .env của chính package (gitignored, không bake vào image).
    # Khối `environment:` dưới ghi đè giá trị hạ tầng docker.
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api/v1
      CORS_ORIGINS: http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tutor?schema=public
      JWT_ACCESS_SECRET: docker-dev-access-secret
      JWT_REFRESH_SECRET: docker-dev-refresh-secret
      JWT_ACCESS_TTL: 900
      JWT_REFRESH_TTL: 1209600
      PASSWORD_MIN_LENGTH: 8
      PASSWORD_MAX_LENGTH: 128
      # RESEND_API_KEY + MAIL_FROM đến từ env_file `.env` (secret, không nhúng compose).
      APP_BASE_URL: "http://localhost:5174"
      CONSENT_STORE_IP: "true"
      CONSENT_STORE_USER_AGENT: "true"
      PLATFORM_BANK_CODE: "970436"
      PLATFORM_BANK_ACCOUNT: "0000000000"
      PLATFORM_BANK_ACCOUNT_NAME: "KIM THANH TUTOR"
      SEPAY_WEBHOOK_API_KEY: docker-dev-sepay-key
      SEPAY_IP_ALLOWLIST: "127.0.0.1,::1"
      MEDIA_SIGNING_SECRET: docker-dev-media-signing-secret
      # Google OAuth creds đến từ env_file `tutor-api/.env` (không nhúng vào compose).
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: ["sh", "-c", "npx prisma db push --accept-data-loss && npx prisma db execute --file prisma/constraints.sql && node dist/main.js"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30

  verify:
    image: kimthanh-tutor-api:local
    pull_policy: never
    environment:
      API_BASE_URL: http://api:3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/tutor?schema=public
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: tutor
      PGUSER: postgres
      PGPASSWORD: postgres
    depends_on:
      api:
        condition: service_healthy
    command: ["sh", "/app/tutor-api/scripts/verify-api-io.sh"]

volumes:
  tutor-postgres-data:
